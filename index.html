<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEWS — Disaster Early Warning System</title>
<style>
  :root{
    --calm:#0F6E56; --calm-bg:#E1F5EE; --done:#1D9E75;
    --alert:#A32D2D; --amber:#BA7517; --blue:#185FA5;
    --text:#1d1d1f; --text2:#6b6b70; --text3:#9a9a9e;
    --surface:#ffffff; --page:#f5f5f3; --border:rgba(0,0,0,0.12);
  }
  @media (prefers-color-scheme: dark){
    :root{ --text:#f0f0f0; --text2:#b0b0b0; --text3:#808080;
      --surface:#1c1c1e; --page:#000; --border:rgba(255,255,255,0.15);
      --calm-bg:#0d2b23; }
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--page);color:var(--text);line-height:1.5;
    max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:40px}
  header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;position:sticky;top:0;background:var(--page);z-index:10}
  .brand{font-size:18px;font-weight:600}
  .gear{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text);padding:4px}
  .scr{padding:0 20px;display:none}
  .scr.on{display:block}
  h1{font-size:24px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:var(--text2);margin-bottom:18px}
  .card{display:flex;align-items:center;gap:14px;width:100%;text-align:left;
    background:var(--surface);border:0.5px solid var(--border);border-radius:14px;
    padding:16px;margin-bottom:14px;cursor:pointer;font-size:inherit;color:inherit}
  .card:active{transform:scale(0.99)}
  .card .ico{font-size:22px;width:36px;text-align:center}
  .card .body{flex:1}
  .card .ttl{font-size:16px;font-weight:600}
  .card .desc{font-size:14px;color:var(--text2)}
  .card .chev{color:var(--text3)}
  .back{background:none;border:none;color:var(--calm);font-size:15px;
    cursor:pointer;padding:8px 0;margin-bottom:8px}
  .tip{background:var(--calm-bg);border-radius:12px;padding:16px;
    display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
  .tip p{color:var(--calm);font-size:14px;flex:1}
  .tip .x{background:none;border:none;color:var(--calm);font-size:18px;cursor:pointer}
  .tipcount{font-size:12px;color:var(--text3);text-align:center;margin-bottom:18px}
  .panel{border:0.5px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
  .panel h3{font-size:16px;margin-bottom:10px}
  .chk{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;font-size:15px}
  .chk .box{width:20px;height:20px;border-radius:4px;border:1.5px solid var(--text3);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;font-size:13px}
  .chk.done .box{background:var(--done);border-color:var(--done)}
  .chk.done span{color:var(--text3);text-decoration:line-through}
  .bigbtn{display:flex;align-items:center;gap:10px;width:100%;color:#fff;border:none;
    border-radius:14px;padding:18px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:12px}
  .estep{background:rgba(186,117,23,0.12);border-left:3px solid var(--amber);
    padding:14px;margin-bottom:8px;border-radius:0}
  .estep b{display:block;font-size:12px;color:var(--amber);margin-bottom:3px}
  .estep span{font-size:15px}
  .place{display:flex;gap:14px;align-items:flex-start;border:0.5px solid var(--border);
    border-radius:12px;padding:14px;margin-bottom:12px}
  .place .ico{font-size:20px;width:28px;text-align:center}
  .place .nm{font-size:16px;font-weight:600}
  .place .dt{font-size:14px;color:var(--text2)}
  .note{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:none;
    align-items:flex-end;justify-content:center;z-index:50}
  .modal.on{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:480px;
    border-radius:18px 18px 0 0;padding:20px}
  .sheet h3{font-size:18px;margin-bottom:16px}
  .langrow{display:flex;gap:10px;margin-bottom:16px}
  .langbtn{flex:1;padding:14px;border:0.5px solid var(--border);border-radius:12px;
    background:var(--surface);color:var(--text);font-size:16px;cursor:pointer}
  .langbtn.sel{background:var(--calm);color:#fff;border-color:var(--calm)}
  .donebtn{width:100%;padding:14px;background:var(--calm);color:#fff;border:none;
    border-radius:12px;font-size:16px;cursor:pointer}
</style>
</head>
<body>

<header>
  <span class="brand">DEWS</span>
  <button class="gear" onclick="openSettings()" aria-label="settings">&#9881;</button>
</header>

<div class="scr on" id="dashboard">
  <h1 data-en="Be ready for anything" data-zh="为任何情况做好准备">Be ready for anything</h1>
  <p class="sub" data-en="Everything here works with no signal." data-zh="这里的一切都无需信号即可使用。">Everything here works with no signal.</p>

  <button class="card" onclick="go('stay')">
    <span class="ico" style="color:var(--calm)">&#9745;</span>
    <span class="body">
      <span class="ttl" data-en="Stay ready" data-zh="保持准备">Stay ready</span><br>
      <span class="desc" data-en="Tips and your checklist" data-zh="贴士和你的清单">Tips and your checklist</span>
    </span>
    <span class="chev">&rsaquo;</span>
  </button>

  <button class="card" onclick="go('emergency')">
    <span class="ico" style="color:var(--alert)">&#9888;</span>
    <span class="body">
      <span class="ttl" data-en="Emergency" data-zh="紧急情况">Emergency</span><br>
      <span class="desc" data-en="What to do right now" data-zh="现在该怎么做">What to do right now</span>
    </span>
    <span class="chev">&rsaquo;</span>
  </button>

  <button class="card" onclick="go('nearby')">
    <span class="ico" style="color:var(--amber)">&#128205;</span>
    <span class="body">
      <span class="ttl" data-en="Nearby help" data-zh="附近的帮助">Nearby help</span><br>
      <span class="desc" data-en="Shelters, water, hospitals" data-zh="避难所、水、医院">Shelters, water, hospitals</span>
    </span>
    <span class="chev">&rsaquo;</span>
  </button>
</div>

<div class="scr" id="stay">
  <button class="back" onclick="go('dashboard')">&lsaquo; <span data-en="Back" data-zh="返回">Back</span></button>
  <div class="tip">
    <p id="tiptext"></p>
    <button class="x" onclick="nextTip()">&times;</button>
  </div>
  <p class="tipcount" id="tipcount"></p>
  <div class="panel">
    <h3 data-en="Readiness checklist" data-zh="准备清单">Readiness checklist</h3>
    <div id="checklist"></div>
  </div>
</div>

<div class="scr" id="emergency">
  <button class="back" onclick="go('dashboard')">&lsaquo; <span data-en="Back" data-zh="返回">Back</span></button>
  <h1 data-en="What's happening?" data-zh="发生了什么？">What's happening?</h1>
  <p class="sub" data-en="Tap one. Large buttons, no menus." data-zh="点击一个。大按钮，无菜单。">Tap one. Large buttons, no menus.</p>
  <button class="bigbtn" style="background:var(--alert)" onclick="showSteps('quake')">&#9889; <span data-en="Earthquake" data-zh="地震">Earthquake</span></button>
  <button class="bigbtn" style="background:var(--blue)" onclick="showSteps('flood')">&#128167; <span data-en="Flood" data-zh="洪水">Flood</span></button>
  <button class="bigbtn" style="background:var(--amber)" onclick="showSteps('fire')">&#128293; <span data-en="Wildfire" data-zh="野火">Wildfire</span></button>
  <div id="steps"></div>
</div>

<div class="scr" id="nearby">
  <button class="back" onclick="go('dashboard')">&lsaquo; <span data-en="Back" data-zh="返回">Back</span></button>
  <h1 data-en="Nearby help" data-zh="附近的帮助">Nearby help</h1>
  <p class="sub" data-en="Saved offline · works without data." data-zh="已离线保存 · 无需数据即可使用。">Saved offline · works without data.</p>
  <div id="places"></div>
  <p class="note" data-en="Map view coming soon." data-zh="地图视图即将推出。">Map view coming soon.</p>
</div>

<div class="modal" id="settings">
  <div class="sheet">
    <h3 data-en="Language" data-zh="语言">Language</h3>
    <div class="langrow">
      <button class="langbtn" id="lang-en" onclick="setLang('en')">English</button>
      <button class="langbtn" id="lang-zh" onclick="setLang('zh')">中文</button>
    </div>
    <button class="donebtn" onclick="closeSettings()" data-en="Done" data-zh="完成">Done</button>
  </div>
</div>

<script>
var lang = localStorage.getItem('dews-lang') || 'en';
var tipIndex = parseInt(localStorage.getItem('dews-tip') || '0');
var checks = JSON.parse(localStorage.getItem('dews-checks') || 'null');

var tips = {
  en: [
    "Keep shoes by your bed. Earthquakes scatter broken glass, and you'll move faster if your feet are protected.",
    "Store water in advance: aim for 4 litres per person per day, enough for three days.",
    "Pick a family meeting point outside your home, in case you can't get back inside.",
    "Charge a power bank weekly. In an outage, a phone is your link to help and information."
  ],
  zh: [
    "在床边放一双鞋。地震会让玻璃碎片散落一地，保护好双脚你就能更快行动。",
    "提前储水：每人每天约 4 升，足够三天使用。",
    "在家外面选一个家庭集合点，以防你无法回到屋内。",
    "每周给充电宝充电。停电时，手机是你联系求助和获取信息的纽带。"
  ]
};

var checklist = [
  {en:"Set emergency contacts", zh:"设置紧急联系人"},
  {en:"Choose a meeting point", zh:"选择集合地点"},
  {en:"Pack a go-bag", zh:"准备应急包"}
];
if(!checks) checks = [false,false,false];

var steps = {
  quake:{ en:[["Step 1 · now","Drop to the ground before it knocks you down."],["Step 2","Cover your head and neck under a sturdy table."],["Step 3","Hold on until the shaking fully stops."]],
          zh:[["第 1 步 · 立即","在被震倒前主动趴下。"],["第 2 步","在坚固的桌子下护住头和颈部。"],["第 3 步","抓牢，直到摇晃完全停止。"]] },
  flood:{ en:[["Step 1 · now","Move to higher ground immediately."],["Step 2","Never walk or drive through moving water."],["Step 3","Avoid downed power lines and report them."]],
          zh:[["第 1 步 · 立即","立刻转移到高地。"],["第 2 步","切勿涉水或驾车穿过流动的水。"],["第 3 步","远离倒下的电线并上报。"]] },
  fire:{ en:[["Step 1 · now","Leave early. Don't wait to see the fire."],["Step 2","Cover nose and mouth to reduce smoke inhalation."],["Step 3","Follow official evacuation routes only."]],
         zh:[["第 1 步 · 立即","尽早撤离。不要等到看见火才走。"],["第 2 步","捂住口鼻，减少吸入烟雾。"],["第 3 步","只走官方撤离路线。"]] }
};

var places = [
  {ico:"&#127968;",col:"var(--calm)", en:["Riverside Community Hall","Shelter · 400m north · enter from Oak St"], zh:["河滨社区中心","避难所 · 向北 400 米 · 从橡树街进入"]},
  {ico:"&#10010;",col:"var(--alert)", en:["Central Hospital","Hospital · 1.2km east · 24-hour A&E"], zh:["中心医院","医院 · 向东 1.2 公里 · 24 小时急诊"]},
  {ico:"&#128167;",col:"var(--blue)", en:["Park water point","Water · 600m south · standpipe near gate"], zh:["公园供水点","供水 · 向南 600 米 · 大门附近的水龙头"]},
  {ico:"&#9889;",col:"var(--amber)", en:["Library charging station","Power · 800m west · open 9am-6pm"], zh:["图书馆充电站","电力 · 向西 800 米 · 上午9点至下午6点开放"]}
];

function go(id){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
function applyLang(){
  document.querySelectorAll('[data-en]').forEach(function(el){
    el.textContent = el.getAttribute('data-'+lang);
  });
  document.getElementById('lang-en').classList.toggle('sel', lang==='en');
  document.getElementById('lang-zh').classList.toggle('sel', lang==='zh');
  renderTip(); renderChecklist(); renderPlaces();
  document.documentElement.lang = lang==='zh'?'zh':'en';
}
function renderTip(){
  document.getElementById('tiptext').textContent = tips[lang][tipIndex];
  var label = lang==='en' ? ('Tip '+(tipIndex+1)+' of '+tips.en.length+' · dismissed tips are saved')
                          : ('第 '+(tipIndex+1)+' / '+tips.zh.length+' 条 · 已关闭的贴士会被保存');
  document.getElementById('tipcount').textContent = label;
}
function nextTip(){
  tipIndex = (tipIndex+1) % tips[lang].length;
  localStorage.setItem('dews-tip', tipIndex);
  renderTip();
}
function renderChecklist(){
  var html='';
  checklist.forEach(function(item,i){
    html += '<div class="chk'+(checks[i]?' done':'')+'" onclick="toggleCheck('+i+')">'
          + '<span class="box">'+(checks[i]?'&#10003;':'')+'</span><span>'+item[lang]+'</span></div>';
  });
  document.getElementById('checklist').innerHTML = html;
}
function toggleCheck(i){
  checks[i] = !checks[i];
  localStorage.setItem('dews-checks', JSON.stringify(checks));
  renderChecklist();
}
function showSteps(key){
  var html='';
  steps[key][lang].forEach(function(line){
    html += '<div class="estep"><b>'+line[0]+'</b><span>'+line[1]+'</span></div>';
  });
  document.getElementById('steps').innerHTML = html;
}
function renderPlaces(){
  var html='';
  places.forEach(function(p){
    html += '<div class="place"><span class="ico" style="color:'+p.col+'">'+p.ico+'</span>'
          + '<div><div class="nm">'+p[lang][0]+'</div><div class="dt">'+p[lang][1]+'</div></div></div>';
  });
  document.getElementById('places').innerHTML = html;
}
function openSettings(){ document.getElementById('settings').classList.add('on'); }
function closeSettings(){ document.getElementById('settings').classList.remove('on'); }
function setLang(l){
  lang = l;
  localStorage.setItem('dews-lang', l);
  applyLang();
}
applyLang();
</script>
</body>
</html>
